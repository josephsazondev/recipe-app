<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" href="./favicon.svg" />
  <title>Recipe &amp; Costing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;background:#f7f7fb;color:#1a1a2e}
    button{font-family:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;background:none}
    input,select,textarea{font-family:inherit;font-size:16px}
    ::placeholder{color:#c4c4d0}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#6c63ff!important;box-shadow:0 0 0 3px rgba(108,99,255,.12)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .sheet-panel{animation:sheetUp .3s cubic-bezier(.22,1,.36,1)}
    .sheet-overlay{animation:fadeIn .2s ease}
    .screen{animation:popIn .26s cubic-bezier(.22,1,.36,1)}
    .pressable{transition:transform .12s ease}
    .pressable:active{transform:scale(.97)}
    ::-webkit-scrollbar{width:0;height:0}
  </style>

</head>
